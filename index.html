<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chuk an Chukk LEGEND</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- STYLE -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

  <!-- HEADER -->
  <h1>Chuk an Chukk 🚀</h1>
  <p>Realtime Wallet Firebase App</p>

  <!-- USER INFO -->
  <div id="userBox">
    <p id="userName">Not logged in</p>
  </div>

  <!-- LOGIN -->
  <button id="loginBtn">Login with Google</button>

  <!-- MENU -->
  <div class="menu">
    <button data-page="home">Home</button>
    <button data-page="wallet">Wallet</button>
    <button data-page="live">Live</button>
    <button data-page="gift">Gift</button>
  </div>

  <!-- CONTENT -->
  <div id="content">
    <p>Silakan login untuk mulai 🚀</p>
  </div>

</div>

<!-- =========================
     SCRIPT APP (WAJIB)
========================= -->
<script type="module" src="script.js"></script>

<!-- =========================
     UI CONTROL (AMAN)
========================= -->
<script>
document.addEventListener("DOMContentLoaded", () => {

  // LOGIN BUTTON
  const loginBtn = document.getElementById("loginBtn");
  if (loginBtn) {
    loginBtn.addEventListener("click", () => {
      if (window.loginPi) {
        window.loginPi();
      } else {
        alert("Script belum siap ❌");
      }
    });
  }

  // MENU NAVIGATION
  document.querySelectorAll("[data-page]").forEach(btn => {
    btn.addEventListener("click", () => {
      if (window.openPage) {
        window.openPage(btn.dataset.page);
      }
    });
  });

});
</script>

</body>
</html>
