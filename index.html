<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chuk an Chukk LEGEND</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

  <!-- HEADER -->
  <h1>Chuk an Chukk 🚀</h1>
  <p>Realtime Wallet System</p>

  <!-- USER INFO -->
  <div id="userBox">
    <p id="userName">Not logged in</p>
  </div>

  <!-- LOGIN -->
  <button id="loginBtn">Login with Google</button>

  <!-- MENU -->
  <div class="menu">
    <button data-page="home">Home</button>
    <button data-page="wallet">Wallet</button>
    <button data-page="live">Live</button>
    <button data-page="gift">Gift</button>
  </div>

  <!-- CONTENT AREA -->
  <div id="content">
    <p>Silakan login untuk mulai 🚀</p>
  </div>

</div>

<!-- SCRIPT FIREBASE + APP LOGIC -->
<script type="module" src="script.js"></script>

<!-- UI BINDING (LOGIN + MENU CLICK) -->
<script>
document.addEventListener("DOMContentLoaded", () => {

  // LOGIN BUTTON
  document.getElementById("loginBtn").addEventListener("click", () => {
    window.loginPi();
  });

  // MENU NAVIGATION
  document.querySelectorAll("[data-page]").forEach(btn => {
    btn.addEventListener("click", () => {
      window.openPage(btn.dataset.page);
    });
  });

});
</script>

</body>
</html>
