<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
  import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAVTEmz3KXZ8AUK5bV1eyGYeowZAVawLXA",
    authDomain: "chuk-apk-a8d8a.firebaseapp.com",
    projectId: "chuk-apk-a8d8a",
    storageBucket: "chuk-apk-a8d8a.firebasestorage.app",
    messagingSenderId: "387902539002",
    appId: "1:387902539002:web:b7d4543ef8a2cc2ea3f543"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  window.loginPi = async function () {
    const provider = new GoogleAuthProvider();

    try {
      const result = await signInWithPopup(auth, provider);
      const user = result.user;

      alert("Login sukses 🔥 " + user.displayName);

      await setDoc(doc(db, "users", user.uid), {
        name: user.displayName,
        email: user.email,
        unlocked: 500,
        locked: 500,
        pi: 10
      });

    } catch (error) {
      alert("Login gagal ❌");
      console.log(error);
    }
  };
</script>

<script src="./script.js"></script>
</body>
