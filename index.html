<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chuk an Chukk LEGEND</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- STYLE -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

  <!-- HEADER -->
  <h1>Chuk an Chukk 🚀 LEGEND</h1>
  <p>Realtime Wallet • Referral • Reward System</p>

  <!-- USER INFO (future realtime) -->
  <div id="userBox">
    <p id="userName">Not logged in</p>
  </div>

  <!-- LOGIN -->
  <button id="loginBtn">Login with Google</button>

  <!-- MENU NAV -->
  <div class="menu">
    <button data-page="home">Home</button>
    <button data-page="wallet">Wallet</button>
    <button data-page="live">Live</button>
    <button data-page="gift">Gift</button>
    <button data-page="leaderboard">Rank</button>
  </div>

  <!-- MAIN CONTENT -->
  <div id="content">
    <p>Welcome to LEGEND SYSTEM ⚡</p>
  </div>

</div>

<!-- MAIN SCRIPT -->
<script type="module" src="script.js"></script>

<!-- UI CONTROLLER (clean binding only) -->
<script>
document.addEventListener("DOMContentLoaded", () => {

  // LOGIN
  document.getElementById("loginBtn").addEventListener("click", () => {
    window.loginPi();
  });

  // NAVIGATION SYSTEM (scalable)
  document.querySelectorAll("[data-page]").forEach(btn => {
    btn.addEventListener("click", () => {
      window.openPage(btn.dataset.page);
    });
  });

});
</script>

</body>
</html>
